<body>
  <div id="root"></div>
  <script>
    window.spotifySDKReady = false;

    window.onSpotifyWebPlaybackSDKReady = () => {
      console.log("⚓ SDK de Spotify detectado por el index.html");
      window.spotifySDKReady = true;
      // Notificamos a React que el objeto 'window.Spotify' ya existe
      window.dispatchEvent(new Event('spotify-sdk-ready'));
    };
  </script>

  <script src="https://sdk.scdn.co/spotify-player.js"></script>
